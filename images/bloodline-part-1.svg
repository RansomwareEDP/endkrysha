<svg viewBox="0 0 680 340" preserveAspectRatio="xMidYMid slice" role="img" xmlns="http://www.w3.org/2000/svg" aria-label="Neon-noir constellation diagram: a single root node forking into two glowing branches">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#221b12"/><stop offset="0.55" stop-color="#16120c"/><stop offset="1" stop-color="#0e0b08"/>
        </linearGradient>
        <radialGradient id="uvglow" cx="0.5" cy="0.85" r="0.75">
          <stop offset="0" stop-color="#b388ff" stop-opacity="0.4"/><stop offset="0.5" stop-color="#b388ff" stop-opacity="0.12"/><stop offset="1" stop-color="#b388ff" stop-opacity="0"/>
        </radialGradient>
        <pattern id="scan" width="4" height="3" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#000000" opacity="0.18"/></pattern>
      </defs>
      <rect x="0" y="0" width="680" height="340" fill="url(#sky)"/>
      <rect x="0" y="0" width="680" height="340" fill="url(#uvglow)"/>
      <!-- faint background stars -->
      <g fill="#79705f" opacity="0.5">
        <circle cx="60" cy="50" r="1.2"/><circle cx="140" cy="90" r="0.9"/><circle cx="240" cy="40" r="1"/><circle cx="420" cy="60" r="1.1"/><circle cx="560" cy="45" r="0.9"/><circle cx="630" cy="100" r="1.2"/><circle cx="80" cy="200" r="0.9"/><circle cx="610" cy="220" r="1"/><circle cx="350" cy="30" r="0.8"/>
      </g>
      <!-- trunk: Zeus to Business Club -->
      <line x1="340" y1="295" x2="340" y2="195" stroke="#ffb454" stroke-width="1.4" opacity="0.8"/>
      <!-- fork lines -->
      <line x1="340" y1="195" x2="170" y2="95" stroke="#b388ff" stroke-width="1.3" opacity="0.85"/>
      <line x1="340" y1="195" x2="510" y2="95" stroke="#b388ff" stroke-width="1.3" opacity="0.85"/>
      <!-- root node -->
      <circle cx="340" cy="295" r="9" fill="#ffb454" opacity="0.95"/>
      <circle cx="340" cy="295" r="17" fill="none" stroke="#ffb454" stroke-width="0.8" opacity="0.4"/>
      <text x="340" y="326" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#f0e7d8" letter-spacing="3">ZEUS</text>
      <!-- fork node -->
      <circle cx="340" cy="195" r="7" fill="#b388ff"/>
      <circle cx="340" cy="195" r="14" fill="none" stroke="#b388ff" stroke-width="0.8" opacity="0.45"/>
      <text x="362" y="200" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#b3a892" letter-spacing="2">THE BUSINESS CLUB</text>
      <!-- branch nodes -->
      <circle cx="170" cy="95" r="7" fill="#b388ff"/>
      <circle cx="170" cy="95" r="14" fill="none" stroke="#b388ff" stroke-width="0.8" opacity="0.45"/>
      <text x="170" y="72" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#f0e7d8" letter-spacing="3">EVIL CORP</text>
      <circle cx="510" cy="95" r="7" fill="#b388ff"/>
      <circle cx="510" cy="95" r="14" fill="none" stroke="#b388ff" stroke-width="0.8" opacity="0.45"/>
      <text x="510" y="72" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#f0e7d8" letter-spacing="3">CONTI</text>
      <rect x="0" y="0" width="680" height="340" fill="url(#scan)"/>
    </svg>