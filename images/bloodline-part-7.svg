<svg viewBox="0 0 680 340" preserveAspectRatio="xMidYMid slice" role="img" xmlns="http://www.w3.org/2000/svg" aria-label="Neon-noir illustration of three glowing pillars labeled money, metal and krysha holding up a roof, with faded brand names beneath">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#221b12"/><stop offset="0.55" stop-color="#16120c"/><stop offset="1" stop-color="#0e0b08"/>
        </linearGradient>
        <radialGradient id="uvglow" cx="0.5" cy="0.3" r="0.75">
          <stop offset="0" stop-color="#b388ff" stop-opacity="0.35"/><stop offset="0.5" stop-color="#b388ff" stop-opacity="0.1"/><stop offset="1" stop-color="#b388ff" stop-opacity="0"/>
        </radialGradient>
        <pattern id="scan" width="4" height="3" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#000000" opacity="0.18"/></pattern>
      </defs>
      <rect x="0" y="0" width="680" height="340" fill="url(#sky)"/>
      <rect x="0" y="0" width="680" height="340" fill="url(#uvglow)"/>
      <!-- roof -->
      <path d="M120 100 L340 45 L560 100 L560 112 L120 112 Z" fill="none" stroke="#ffb454" stroke-width="1.6" opacity="0.9"/>
      <text x="340" y="88" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#ffb454" letter-spacing="4">KRYSHA</text>
      <!-- pillars -->
      <g stroke="#b388ff" stroke-width="1.4" opacity="0.9" fill="none">
        <rect x="165" y="112" width="46" height="150"/>
        <rect x="317" y="112" width="46" height="150"/>
        <rect x="469" y="112" width="46" height="150"/>
      </g>
      <text x="188" y="290" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#b3a892" letter-spacing="3">MONEY</text>
      <text x="340" y="290" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#b3a892" letter-spacing="3">METAL</text>
      <text x="492" y="290" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#b3a892" letter-spacing="3">PEOPLE</text>
      <!-- faded discarded brand names -->
      <g font-family="'IBM Plex Mono', monospace" font-size="8" fill="#79705f" opacity="0.55">
        <text x="120" y="322" letter-spacing="2">CONTI</text>
        <text x="205" y="322" letter-spacing="2">REVIL</text>
        <text x="285" y="322" letter-spacing="2">DARKSIDE</text>
        <text x="395" y="322" letter-spacing="2">ROYAL</text>
        <text x="470" y="322" letter-spacing="2">LOCKBIT</text>
        <text x="570" y="322" letter-spacing="2">MAZE</text>
      </g>
      <rect x="0" y="0" width="680" height="340" fill="url(#scan)"/>
    </svg>