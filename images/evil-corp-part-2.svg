<svg viewBox="0 0 680 340" preserveAspectRatio="xMidYMid slice" role="img" xmlns="http://www.w3.org/2000/svg" aria-label="Neon-noir illustration of a roofline drawn over a network of constellation nodes, the krysha above the operation">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#221b12"/><stop offset="0.55" stop-color="#16120c"/><stop offset="1" stop-color="#0e0b08"/>
        </linearGradient>
        <radialGradient id="uvglow" cx="0.5" cy="0.1" r="0.75">
          <stop offset="0" stop-color="#b388ff" stop-opacity="0.5"/><stop offset="0.5" stop-color="#b388ff" stop-opacity="0.14"/><stop offset="1" stop-color="#b388ff" stop-opacity="0"/>
        </radialGradient>
        <pattern id="scan" width="4" height="3" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#000000" opacity="0.18"/></pattern>
      </defs>
      <rect x="0" y="0" width="680" height="340" fill="url(#sky)"/>
      <rect x="0" y="0" width="680" height="340" fill="url(#uvglow)"/>
      <!-- the roof / krysha -->
      <path d="M40 150 L340 54 L640 150" fill="none" stroke="#b388ff" stroke-width="2.4" opacity="0.92"/>
      <path d="M40 150 L340 54 L640 150 L640 162 L340 66 L40 162 Z" fill="#b388ff" opacity="0.10"/>
      <circle cx="340" cy="54" r="4" fill="#ffb454"/><circle cx="340" cy="54" r="9" fill="none" stroke="#ffb454" stroke-width="0.8" opacity="0.5"/>
      <!-- network of nodes under the roof -->
      <g stroke="#f0e7d8" stroke-width="0.6" opacity="0.16" fill="none">
        <line x1="120" y1="232" x2="210" y2="198"/><line x1="210" y1="198" x2="300" y2="244"/><line x1="300" y1="244" x2="392" y2="200"/><line x1="392" y1="200" x2="470" y2="250"/><line x1="470" y1="250" x2="560" y2="210"/><line x1="210" y1="198" x2="300" y2="160"/><line x1="300" y1="160" x2="392" y2="200"/><line x1="120" y1="232" x2="300" y2="244"/><line x1="392" y1="200" x2="560" y2="210"/><line x1="300" y1="160" x2="340" y2="120"/>
      </g>
      <g fill="#b388ff">
        <g opacity="0.22"><circle cx="120" cy="232" r="3.4"/><circle cx="210" cy="198" r="3.4"/><circle cx="300" cy="244" r="3.4"/><circle cx="392" cy="200" r="3.4"/><circle cx="470" cy="250" r="3.4"/><circle cx="560" cy="210" r="3.4"/><circle cx="300" cy="160" r="3.4"/></g>
        <circle cx="120" cy="232" r="1.5"/><circle cx="210" cy="198" r="1.5"/><circle cx="300" cy="244" r="1.5"/><circle cx="392" cy="200" r="1.5"/><circle cx="470" cy="250" r="1.5"/><circle cx="560" cy="210" r="1.5"/><circle cx="300" cy="160" r="1.5"/>
      </g>
      <circle cx="340" cy="120" r="2.4" fill="#ffb454"/>
      <line x1="340" y1="63" x2="340" y2="116" stroke="#ffb454" stroke-width="0.8" opacity="0.45" stroke-dasharray="2 3"/>
      <rect x="0" y="0" width="680" height="340" fill="url(#scan)"/>
    </svg>