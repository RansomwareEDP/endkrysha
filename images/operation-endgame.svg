<svg viewBox="0 0 680 340" preserveAspectRatio="xMidYMid slice" role="img" xmlns="http://www.w3.org/2000/svg" aria-label="Neon-noir network diagram: a constellation of infrastructure nodes, several severed and dark, beneath a faint amber roof that remains intact">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#201a12"/><stop offset="0.55" stop-color="#16120c"/><stop offset="1" stop-color="#0e0b08"/>
        </linearGradient>
        <radialGradient id="redglow" cx="0.5" cy="0.78" r="0.7">
          <stop offset="0" stop-color="#ff4757" stop-opacity="0.4"/><stop offset="0.55" stop-color="#ff4757" stop-opacity="0.12"/><stop offset="1" stop-color="#ff4757" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="amberglow" cx="0.5" cy="0.06" r="0.7">
          <stop offset="0" stop-color="#ffb454" stop-opacity="0.28"/><stop offset="1" stop-color="#ffb454" stop-opacity="0"/>
        </radialGradient>
        <pattern id="scan" width="4" height="3" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#000000" opacity="0.18"/></pattern>
      </defs>
      <rect x="0" y="0" width="680" height="340" fill="url(#sky)"/>
      <rect x="0" y="0" width="680" height="340" fill="url(#amberglow)"/>
      <rect x="0" y="0" width="680" height="340" fill="url(#redglow)"/>

      <!-- THE ROOF: intact, untouched, faint amber canopy across the top -->
      <g stroke="#ffb454" fill="none" opacity="0.5">
        <path d="M 40 86 Q 340 30 640 86" stroke-width="1.6" opacity="0.55"/>
        <path d="M 40 86 Q 340 44 640 86" stroke-width="0.8" opacity="0.3"/>
        <line x1="120" y1="74" x2="120" y2="96" stroke-width="0.7"/>
        <line x1="250" y1="58" x2="250" y2="96" stroke-width="0.7"/>
        <line x1="340" y1="52" x2="340" y2="96" stroke-width="0.7"/>
        <line x1="430" y1="58" x2="430" y2="96" stroke-width="0.7"/>
        <line x1="560" y1="74" x2="560" y2="96" stroke-width="0.7"/>
      </g>
      <g fill="#ffb454" opacity="0.6">
        <circle cx="120" cy="74" r="1.6"/><circle cx="250" cy="58" r="1.6"/><circle cx="340" cy="52" r="1.8"/><circle cx="430" cy="58" r="1.6"/><circle cx="560" cy="74" r="1.6"/>
      </g>

      <!-- ENABLING LAYER: the network of nodes Endgame reaches -->
      <!-- active edges -->
      <g stroke="#f0e7d8" stroke-width="0.7" opacity="0.16" fill="none">
        <line x1="120" y1="210" x2="205" y2="178"/>
        <line x1="205" y1="178" x2="300" y2="222"/>
        <line x1="300" y1="222" x2="392" y2="172"/>
        <line x1="392" y1="172" x2="478" y2="214"/>
        <line x1="478" y1="214" x2="560" y2="186"/>
        <line x1="205" y1="178" x2="252" y2="262"/>
        <line x1="252" y1="262" x2="300" y2="222"/>
        <line x1="392" y1="172" x2="436" y2="262"/>
        <line x1="436" y1="262" x2="478" y2="214"/>
      </g>
      <!-- severed edges (taken down): dashed, broken, red-tinted -->
      <g stroke="#ff4757" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.4" fill="none">
        <line x1="120" y1="210" x2="158" y2="150"/>
        <line x1="392" y1="172" x2="352" y2="150"/>
        <line x1="560" y1="186" x2="528" y2="250"/>
        <line x1="560" y1="186" x2="618" y2="208"/>
      </g>

      <!-- active nodes -->
      <g fill="#ff4757">
        <g opacity="0.22"><circle cx="120" cy="210" r="6"/><circle cx="205" cy="178" r="6"/><circle cx="300" cy="222" r="6"/><circle cx="392" cy="172" r="6"/><circle cx="478" cy="214" r="6"/><circle cx="560" cy="186" r="6"/><circle cx="252" cy="262" r="6"/><circle cx="436" cy="262" r="6"/></g>
        <circle cx="120" cy="210" r="2.4"/><circle cx="205" cy="178" r="2.4"/><circle cx="300" cy="222" r="2.4"/><circle cx="392" cy="172" r="2.4"/><circle cx="478" cy="214" r="2.4"/><circle cx="560" cy="186" r="2.4"/><circle cx="252" cy="262" r="2.4"/><circle cx="436" cy="262" r="2.4"/>
      </g>

      <!-- struck nodes: dark, crossed out -->
      <g stroke="#79705f" stroke-width="1.1" opacity="0.7">
        <line x1="153" y1="145" x2="163" y2="155"/><line x1="163" y1="145" x2="153" y2="155"/>
        <line x1="347" y1="145" x2="357" y2="155"/><line x1="357" y1="145" x2="347" y2="155"/>
        <line x1="523" y1="245" x2="533" y2="255"/><line x1="533" y1="245" x2="523" y2="255"/>
        <line x1="613" y1="203" x2="623" y2="213"/><line x1="623" y1="203" x2="613" y2="213"/>
      </g>

      <rect x="0" y="0" width="680" height="340" fill="url(#scan)"/>
    </svg>