<svg viewBox="0 0 680 340" preserveAspectRatio="xMidYMid slice" role="img" xmlns="http://www.w3.org/2000/svg" aria-label="Neon-noir illustration of a laundering chain running from a locked wallet on the left to a stack of cash on the right">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#221b12"/><stop offset="0.55" stop-color="#16120c"/><stop offset="1" stop-color="#0e0b08"/>
        </linearGradient>
        <radialGradient id="redglow" cx="0.12" cy="0.4" r="0.55">
          <stop offset="0" stop-color="#ff4757" stop-opacity="0.55"/><stop offset="0.5" stop-color="#ff4757" stop-opacity="0.16"/><stop offset="1" stop-color="#ff4757" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="amberglow" cx="0.9" cy="0.62" r="0.55">
          <stop offset="0" stop-color="#ffb454" stop-opacity="0.4"/><stop offset="0.55" stop-color="#ffb454" stop-opacity="0.12"/><stop offset="1" stop-color="#ffb454" stop-opacity="0"/>
        </radialGradient>
        <pattern id="scan" width="4" height="3" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#000000" opacity="0.18"/></pattern>
      </defs>
      <rect x="0" y="0" width="680" height="340" fill="url(#sky)"/>
      <rect x="0" y="0" width="680" height="340" fill="url(#redglow)"/>
      <rect x="0" y="0" width="680" height="340" fill="url(#amberglow)"/>

      <!-- laundering chain: many nodes drifting left (red) to right (amber) -->
      <g stroke="#f0e7d8" stroke-width="0.6" opacity="0.14" fill="none">
        <path d="M96,168 C170,120 210,214 288,170 C356,132 396,220 470,172 C540,128 566,208 604,176"/>
        <path d="M96,168 C168,206 232,120 300,176 C372,232 404,120 470,172 C536,214 574,140 604,176"/>
        <line x1="96" y1="168" x2="150" y2="96"/><line x1="150" y1="96" x2="248" y2="120"/><line x1="248" y1="120" x2="330" y2="86"/><line x1="330" y1="86" x2="430" y2="112"/><line x1="430" y1="112" x2="520" y2="90"/><line x1="520" y1="90" x2="604" y2="120"/>
        <line x1="248" y1="120" x2="288" y2="170"/><line x1="430" y1="112" x2="470" y2="172"/>
      </g>

      <!-- node cloud, color shifting across the frame -->
      <g>
        <g fill="#ff4757">
          <g opacity="0.22"><circle cx="96" cy="168" r="6"/><circle cx="150" cy="96" r="4"/></g>
          <circle cx="96" cy="168" r="2.4"/><circle cx="150" cy="96" r="1.5"/><circle cx="180" cy="210" r="1.4"/><circle cx="140" cy="150" r="1.2"/>
        </g>
        <g fill="#ff7d6b">
          <circle cx="248" cy="120" r="1.6"/><circle cx="288" cy="170" r="2"/><circle cx="230" cy="188" r="1.3"/><circle cx="300" cy="110" r="1.2"/>
        </g>
        <g fill="#e79a6a">
          <circle cx="330" cy="86" r="1.6"/><circle cx="358" cy="176" r="1.6"/><circle cx="392" cy="128" r="1.3"/>
        </g>
        <g fill="#ffb454">
          <circle cx="430" cy="112" r="1.7"/><circle cx="470" cy="172" r="2.2"/><circle cx="452" cy="140" r="1.3"/><circle cx="500" cy="150" r="1.4"/>
          <g opacity="0.22"><circle cx="604" cy="176" r="7"/><circle cx="520" cy="90" r="4"/></g>
          <circle cx="520" cy="90" r="1.6"/><circle cx="604" cy="176" r="2.6"/><circle cx="566" cy="120" r="1.4"/><circle cx="580" cy="206" r="1.3"/>
        </g>
      </g>

      <!-- left: locked wallet (the ransom), red -->
      <g transform="translate(60,140)">
        <rect x="0" y="16" width="58" height="44" rx="5" fill="#0e0a08" stroke="#ff4757" stroke-opacity="0.7" stroke-width="1.4"/>
        <path d="M14,16 v-6 a15,15 0 0 1 30,0 v6" fill="none" stroke="#ff4757" stroke-opacity="0.7" stroke-width="1.4"/>
        <circle cx="29" cy="36" r="4.5" fill="#ff4757"/><rect x="27.5" y="36" width="3" height="12" fill="#ff4757"/>
      </g>

      <!-- right: cash stack (fiat), amber -->
      <g transform="translate(556,150)">
        <rect x="0" y="30" width="66" height="16" rx="2" fill="#120f0a" stroke="#ffb454" stroke-opacity="0.7" stroke-width="1.2"/>
        <rect x="4" y="18" width="66" height="16" rx="2" fill="#141009" stroke="#ffb454" stroke-opacity="0.7" stroke-width="1.2"/>
        <rect x="8" y="6" width="66" height="16" rx="2" fill="#161109" stroke="#ffb454" stroke-opacity="0.85" stroke-width="1.2"/>
        <circle cx="41" cy="14" r="4" fill="none" stroke="#ffb454" stroke-opacity="0.8" stroke-width="1.1"/>
      </g>

      <rect x="0" y="298" width="680" height="2" fill="#ff4757" opacity="0.35"/>
      <rect x="0" y="300" width="680" height="40" fill="#0a0805"/>
      <rect x="0" y="0" width="680" height="340" fill="url(#scan)"/>
    </svg>