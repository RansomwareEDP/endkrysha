<svg viewBox="0 0 680 340" preserveAspectRatio="xMidYMid slice" role="img" xmlns="http://www.w3.org/2000/svg" aria-label="Neon-noir diagram of a seven-step cash-out chain: a cold coin on the left handed node to node across a dark skyline until it lands as amber rubles on the right, with the thinnest links glowing red">
